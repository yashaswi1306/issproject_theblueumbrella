<!DOCTYPE html>
<html>
<head>
    <title>Leaderboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sand: #f5efe6;
            --ocean: #7bbfd4;
            --ocean-dark: #5aa3bc;
            --ocean-light: #c6e4ef;
            --foam: #eef8fb;
            --text: #3a5f6f;
            --accent: #e07b6a;
            --wave: #a8d8e8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--sand);
            min-height: 100vh;
            padding: 40px 20px 80px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 180px;
            background: var(--ocean);
            clip-path: ellipse(60% 100% at 50% 0%);
            z-index: 0;
        }

        .page-header {
            position: relative;
            z-index: 1;
            text-align: center;
            margin-bottom: 32px;
            padding-top: 10px;
        }

        .page-header .emoji {
            font-size: 2.4rem;
            display: block;
            margin-bottom: 4px;
        }

        h1 {
            font-family: 'Times New Roman';
            color: white;
            font-size: 2.2rem;
            text-shadow: 0 2px 12px rgba(90, 163, 188, 0.4);
        }

        .subtitle {
            color: var(--ocean-light);
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .table-wrap {
            position: relative;
            z-index: 1;
            max-width: 560px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(90, 163, 188, 0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead tr {
            background: var(--ocean);
        }

        th {
            padding: 14px 20px;
            color: white;
            font-family: 'Times New Roman';
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 0.04em;
            text-align: left;
        }

        th:last-child { text-align: right; }

        td {
            padding: 13px 20px;
            color: var(--text);
            font-weight: 600;
            font-size: 0.95rem;
            border-bottom: 1px solid #f0f0f0;
        }

        td:last-child { text-align: right; }

        tr:last-child td { border-bottom: none; }

        tbody tr:nth-child(even) { background: var(--foam); }

        tbody tr:hover { background: var(--ocean-light); transition: background 0.15s; }

        .rank-1 td:first-child { color: #f5c842; font-size: 1.1rem; }
        .rank-2 td:first-child { color: #a0aec0; font-size: 1.05rem; }
        .rank-3 td:first-child { color: #c97b3a; font-size: 1rem; }

        .elo-badge {
            display: inline-block;
            background: var(--ocean-light);
            color: var(--ocean-dark);
            border-radius: 20px;
            padding: 2px 12px;
            font-size: 0.85rem;
            font-weight: 700;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            position: relative;
            z-index: 1;
            color: var(--ocean-dark);
            font-weight: 700;
            font-size: 0.9rem;
            text-decoration: none;
            letter-spacing: 0.04em;
        }

        .back-link:hover { color: var(--accent); }
    </style>
</head>
<body>
    <div class="page-header">
        <span class="emoji">🏆</span>
        <h1>Leaderboard</h1>
        <p class="subtitle">top surfers of the board</p>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr><th>Rank</th><th>Name</th><th>Elo Rating</th></tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

    <a class="back-link" href="/lobby">← jumping back to ze lobby</a>

    <script>
        const medals = ['🥇', '🥈', '🥉'];
        fetch('/api/leaderboard', { credentials: 'include' })
            .then(r => r.json())
            .then(data => {
                const tbody = document.getElementById('tbody');
                data.forEach((user, i) => {
                    const row = document.createElement('tr');
                    if (i < 3) row.className = `rank-${i+1}`;
                    const rank = i < 3 ? medals[i] : i + 1;
                    row.innerHTML = `<td>${rank}</td><td>${user.name}</td><td><span class="elo-badge">${user.elo_rating}</span></td>`;
                    tbody.appendChild(row);
                });
            });
    </script>
</body>
</html>
